server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/ai_companion?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    default-property-inclusion: non_null

app:
  jwt:
    secret: ${APP_JWT_SECRET:xiuninvyou-super-secret-key-at-least-32-bytes-long}
    expire-seconds: ${APP_JWT_EXPIRE_SECONDS:604800}
